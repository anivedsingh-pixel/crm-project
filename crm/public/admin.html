<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — User Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #161920; --surface2: #1e2230;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.1);
    --text: #f0f2f7; --text2: #8b93a8; --text3: #555e75;
    --accent: #3d7eff; --accent-glow: rgba(61,126,255,0.2);
    --danger: #ff5c5c; --success: #2dd68c;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border2);
    padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-brand { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .topbar-brand span { color: var(--text2); font-weight: 400; }
  .topbar-right { display: flex; gap: 10px; align-items: center; }
  .back-btn {
    background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
    padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { border-color: rgba(255,255,255,0.2); }

  .container { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem; }
  h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .page-sub { color: var(--text2); font-size: 13px; margin-bottom: 2rem; }

  .card {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 14px;
    padding: 1.5rem; margin-bottom: 1.5rem;
  }
  .card h3 { font-size: 14px; font-weight: 600; margin-bottom: 1rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .field input, .field select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 10px 12px; font-size: 13px;
    font-family: 'DM Sans', sans-serif; color: var(--text); outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text3); }
  select option { background: var(--surface2); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 10px 18px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: background 0.2s, opacity 0.2s;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .btn:hover { background: #5591ff; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.danger { background: var(--danger); box-shadow: none; }
  .btn.danger:hover { background: #ff7a7a; }
  .btn.ghost { background: var(--surface2); box-shadow: none; border: 1px solid var(--border2); }
  .btn.ghost:hover { border-color: rgba(255,255,255,0.2); }

  .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
  .msg.success { background: rgba(45,214,140,0.12); border: 1px solid rgba(45,214,140,0.3); color: #2dd68c; }
  .msg.error { background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.3); color: #ff8a8a; }

  .users-list { display: flex; flex-direction: column; gap: 10px; }
  .user-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
  }
  .user-avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; flex-shrink: 0;
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 14px; font-weight: 500; }
  .user-email { font-size: 12px; color: var(--text2); }
  .role-badge {
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 100px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .role-badge.admin { background: rgba(61,126,255,0.15); color: #3d7eff; border: 1px solid rgba(61,126,255,0.3); }
  .role-badge.member { background: rgba(139,147,168,0.12); color: #8b93a8; border: 1px solid rgba(139,147,168,0.2); }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { color: var(--text3); font-size: 13px; text-align: center; padding: 1.5rem; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">📊 Sales CRM <span>/ Admin</span></div>
  <div class="topbar-right">
    <a href="app.html" class="back-btn">← Back to CRM</a>
    <button class="btn ghost" onclick="signOut()" style="padding:7px 14px;font-size:13px">Sign out</button>
  </div>
</div>

<div class="container">
  <h2>User Management</h2>
  <p class="page-sub">Invite team members and manage their access roles.</p>

  <div class="card">
    <h3>Invite New User</h3>
    <div id="invite-msg" class="msg"></div>
    <div class="row2">
      <div class="field"><label>First Name</label><input id="inv-first" placeholder="Ravi"></div>
      <div class="field"><label>Last Name</label><input id="inv-last" placeholder="Sharma"></div>
    </div>
    <div class="field"><label>Email Address</label><input id="inv-email" type="email" placeholder="ravi@company.com"></div>
    <div class="row2">
      <div class="field"><label>Temporary Password</label><input id="inv-pass" type="password" placeholder="Min 8 characters"></div>
      <div class="field">
        <label>Role</label>
        <select id="inv-role">
          <option value="member">Member — can add/edit leads</option>
          <option value="admin">Admin — full access</option>
        </select>
      </div>
    </div>
    <button class="btn" id="invite-btn" onclick="createUser()">Create Account</button>
    <p style="font-size:12px;color:var(--text3);margin-top:10px">The user will log in with this email & password and can change it later.</p>
  </div>

  <div class="card">
    <h3>Team Members (<span id="user-count">0</span>)</h3>
    <div id="users-list" class="users-list"><div class="empty"><span class="spinner"></span></div></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ─── PASTE YOUR FIREBASE CONFIG HERE ───────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAw17UwyXNCav9vVnm01iEROMuY2ixepWg",
  authDomain: "my-sales-crm-74879.firebaseapp.com",
  projectId: "my-sales-crm-74879",
  storageBucket: "my-sales-crm-74879.firebasestorage.app",
  messagingSenderId: "686320620308",
  appId: "1:686320620308:web:5f563090be8042c87be801",
  measurementId: "G-SBKWJGDXD3"
};
// ────────────────────────────────────────────────────────────

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Guard: only admin can access this page
auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  const snap = await db.collection('users').doc(user.uid).get();
  if (!snap.exists || snap.data().role !== 'admin') {
    alert('Access denied. Admins only.');
    window.location.href = 'app.html';
    return;
  }
  loadUsers();
});

async function loadUsers() {
  const snap = await db.collection('users').orderBy('createdAt', 'desc').get();
  const list = document.getElementById('users-list');
  document.getElementById('user-count').textContent = snap.size;
  if (snap.empty) { list.innerHTML = '<div class="empty">No users yet.</div>'; return; }

  list.innerHTML = snap.docs.map(doc => {
    const d = doc.data();
    const initials = ((d.firstName||'?')[0] + (d.lastName||'')[0]).toUpperCase();
    return `<div class="user-row">
      <div class="user-avatar">${initials}</div>
      <div class="user-info">
        <div class="user-name">${d.firstName||''} ${d.lastName||''}</div>
        <div class="user-email">${d.email||''}</div>
      </div>
      <span class="role-badge ${d.role}">${d.role}</span>
      ${d.role !== 'admin' ? `<button class="btn ghost" style="padding:6px 12px;font-size:12px" onclick="changeRole('${doc.id}','admin')">Make Admin</button>` : ''}
      ${d.role !== 'member' ? '' : `<button class="btn ghost" style="padding:6px 12px;font-size:12px" onclick="changeRole('${doc.id}','member')" disabled>Member</button>`}
    </div>`;
  }).join('');
}

async function changeRole(uid, role) {
  await db.collection('users').doc(uid).update({ role });
  loadUsers();
}

function showMsg(type, text) {
  const el = document.getElementById('invite-msg');
  el.className = `msg ${type}`;
  el.textContent = text;
  el.style.display = 'block';
  if (type === 'success') setTimeout(() => { el.style.display = 'none'; }, 4000);
}

async function createUser() {
  const first = document.getElementById('inv-first').value.trim();
  const last = document.getElementById('inv-last').value.trim();
  const email = document.getElementById('inv-email').value.trim();
  const pass = document.getElementById('inv-pass').value;
  const role = document.getElementById('inv-role').value;

  if (!first || !email || !pass) { showMsg('error', 'First name, email, and password are required.'); return; }
  if (pass.length < 8) { showMsg('error', 'Password must be at least 8 characters.'); return; }

  const btn = document.getElementById('invite-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating…';

  try {
    // Create the auth user
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    // Store user profile in Firestore
    await db.collection('users').doc(cred.user.uid).set({
      uid: cred.user.uid, firstName: first, lastName: last, email, role,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showMsg('success', `✓ Account created for ${first} ${last}. Share the password with them.`);
    document.getElementById('inv-first').value = '';
    document.getElementById('inv-last').value = '';
    document.getElementById('inv-email').value = '';
    document.getElementById('inv-pass').value = '';
    loadUsers();
  } catch (e) {
    const msgs = {
      'auth/email-already-in-use': 'An account with this email already exists.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/weak-password': 'Password is too weak.',
    };
    showMsg('error', msgs[e.code] || e.message);
  }

  btn.disabled = false; btn.innerHTML = 'Create Account';
}

function signOut() {
  auth.signOut().then(() => window.location.href = 'index.html');
}
</script>
</body>
</html>
